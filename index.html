/* ─── Midnatt ─────────────────────────────────────────────────────────────── */
[data-theme="midnatt"]{--bg:#1A1D23;--bg-card:#22262F;--primary:#7EB8DA;--primary-light:#9ECCE8;--accent:#F0C754;--accent-light:#F6D980;--highlight:#1E2C3A;--highlight-border:#4A80A8;--surface-soft:#1E2229;--surface-strong:#252A34;--text:#D8E6F0;--text-muted:#7A96AA;--border:#2E3540;--input-bg:#1E2229;--table-header-bg:#2A3545;--table-header-text:#D8E6F0;--table-stripe:#1F252D;--shadow:0 1px 3px rgba(0,0,0,.25),0 1px 2px rgba(0,0,0,.2);--shadow-lg:0 4px 12px rgba(0,0,0,.35),0 2px 4px rgba(0,0,0,.25);--radius:8px;--radius-lg:12px;--error:#FF6B6B;--blow-color:#7EB8DA;--draw-color:#F0C754;--bend-color:#7A96AA;--strip-blow-1:#2A3A4A;--strip-blow-1-text:#9ECCE8;--strip-blow-2:#3A6080;--strip-blow-2-text:#D8E6F0;--strip-blow-3:#283040;--strip-blow-3-text:#6A9AB8;--strip-draw-1:#3A3520;--strip-draw-1-text:#F0C754;--strip-draw-2:#7A6020;--strip-draw-2-text:#F6D980;--strip-draw-3:#2E2A18;--strip-draw-3-text:#C8A840;--strip-hole-bg:#252A34;--strip-hole-border:var(--border)}
/* ─── Grafit ──────────────────────────────────────────────────────────────── */
[data-theme="grafit"]{--bg:#1E1E22;--bg-card:#26262C;--primary:#A0D4A0;--primary-light:#B8E2B8;--accent:#E8A445;--accent-light:#F0BF70;--highlight:#202A20;--highlight-border:#5A8A5A;--surface-soft:#222228;--surface-strong:#282830;--text:#D4E8D4;--text-muted:#7A967A;--border:#303038;--input-bg:#222228;--table-header-bg:#2A3A2A;--table-header-text:#D4E8D4;--table-stripe:#232328;--shadow:0 1px 3px rgba(0,0,0,.28),0 1px 2px rgba(0,0,0,.22);--shadow-lg:0 4px 12px rgba(0,0,0,.38),0 2px 4px rgba(0,0,0,.28);--radius:8px;--radius-lg:12px;--error:#FF8080;--blow-color:#A0D4A0;--draw-color:#E8A445;--bend-color:#7A967A;--strip-blow-1:#253025;--strip-blow-1-text:#A0D4A0;--strip-blow-2:#2A4A2A;--strip-blow-2-text:#D4E8D4;--strip-blow-3:#202820;--strip-blow-3-text:#6AAA6A;--strip-draw-1:#302818;--strip-draw-1-text:#E8A445;--strip-draw-2:#6A5020;--strip-draw-2-text:#F0BF70;--strip-draw-3:#282010;--strip-draw-3-text:#C08830;--strip-hole-bg:#282830;--strip-hole-border:var(--border)}
/* ─── Konstruktivist ─────────────────────────────────────────────────────── */
[data-theme="konstruktivist"]{--bg:#0D0D0D;--bg-card:#141414;--primary:#B71C1C;--primary-light:#CC3333;--accent:#F0DFC0;--accent-light:#F5ECD0;--highlight:#1A1614;--highlight-border:#CC3333;--surface-soft:#141414;--surface-strong:#1A1A1A;--text:#F0DFC0;--text-muted:#8A7E6B;--border:#2A2520;--input-bg:#141414;--table-header-bg:#B71C1C;--table-header-text:#F0DFC0;--table-stripe:#141414;--shadow:0 1px 3px rgba(0,0,0,.4),0 1px 2px rgba(0,0,0,.3);--shadow-lg:0 4px 12px rgba(0,0,0,.55),0 2px 4px rgba(0,0,0,.4);--radius:8px;--radius-lg:12px;--error:#E53935;--blow-color:#CC3333;--draw-color:#F0DFC0;--bend-color:#8A7E6B;--strip-blow-1:#2A1010;--strip-blow-1-text:#CC6666;--strip-blow-2:#8B1A1A;--strip-blow-2-text:#F0DFC0;--strip-blow-3:#4A1515;--strip-blow-3-text:#CC8888;--strip-draw-1:#1A1810;--strip-draw-1-text:#D0C0A0;--strip-draw-2:#3A3020;--strip-draw-2-text:#F0DFC0;--strip-draw-3:#1E1A12;--strip-draw-3-text:#A09070;--strip-hole-bg:#1A1A1A;--strip-hole-border:var(--border)}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;transition:background .3s,color .3s}
.app-shell{max-width:1200px;margin:0 auto;padding:1.5rem 1.5rem 4rem}

header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:2px solid var(--border)}
header h1{font-family:'Literata',serif;font-size:1.8rem;font-weight:700;color:var(--text);letter-spacing:-.02em}
header h1 span{color:var(--accent);font-weight:400;font-style:italic}
.controls{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
.chip{font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:600;padding:.35rem .75rem;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--bg-card);color:var(--text-muted);cursor:pointer;transition:all .15s;user-select:none}
.chip:hover{border-color:var(--accent);color:var(--text)}
.chip.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.chip-group{display:flex;gap:.35rem;flex-wrap:wrap}
.chip-group-label{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:.25rem}
.chip-section{display:flex;flex-direction:column;gap:.25rem}

.tab-bar{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:1.5rem;overflow-x:auto}
.tab{font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;padding:.65rem 1.2rem;border:none;background:transparent;color:var(--text-muted);cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-2px;transition:all .15s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);padding:1.25rem;margin-bottom:1.25rem;transition:background .3s,border-color .3s}
.card h2{font-family:'Literata',serif;font-size:1.15rem;font-weight:700;margin-bottom:.75rem;color:var(--text)}
.card h3{font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;margin-bottom:.5rem;color:var(--primary)}
.card p{font-size:.85rem;color:var(--text-muted);margin-bottom:.5rem}

.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-family:'JetBrains Mono',monospace;font-size:.78rem}
thead th{background:var(--table-header-bg);color:var(--table-header-text);padding:.55rem .65rem;text-align:left;font-weight:600;position:sticky;top:0;z-index:2}
thead th:first-child{border-radius:var(--radius) 0 0 0}
thead th:last-child{border-radius:0 var(--radius) 0 0}
tbody td{padding:.45rem .65rem;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:nth-child(even){background:var(--table-stripe)}
tbody tr:hover{background:var(--highlight)}
.cell-blow{color:var(--blow-color);font-weight:600}
.cell-draw{color:var(--draw-color);font-weight:600}
.cell-bend{color:var(--bend-color);font-size:.72rem}
.cell-hole{font-weight:700;color:var(--text);text-align:center;width:2.5rem}
.cell-degree{font-size:.7rem;color:var(--text-muted);margin-left:.25rem}

.legend{display:flex;gap:1.2rem;flex-wrap:wrap;font-size:.75rem;color:var(--text-muted);margin-bottom:.75rem}
.legend-item{display:flex;align-items:center;gap:.35rem}
.legend-swatch{width:12px;height:12px;border-radius:3px}

.harp-visual{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;margin-bottom:1rem}
.hole-cell{background:var(--surface-soft);border:1px solid var(--border);border-radius:var(--radius);padding:.35rem .15rem;text-align:center;font-family:'JetBrains Mono',monospace;font-size:.68rem;line-height:1.35;transition:all .15s;cursor:default}
.hole-cell:hover{background:var(--highlight);border-color:var(--highlight-border);transform:translateY(-1px);box-shadow:var(--shadow)}
.hole-num{font-weight:700;font-size:.72rem;color:var(--text-muted);margin-bottom:.2rem}
.hole-blow{color:var(--blow-color);font-weight:600}
.hole-draw{color:var(--draw-color);font-weight:600}
.hole-bend{color:var(--bend-color);font-size:.6rem;line-height:1.2}
.hole-cell.highlighted{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.hole-cell.highlighted .hole-num,.hole-cell.highlighted .hole-blow,.hole-cell.highlighted .hole-draw,.hole-cell.highlighted .hole-bend{color:var(--bg)}

.info-box{background:var(--highlight);border-left:3px solid var(--highlight-border);border-radius:0 var(--radius) var(--radius) 0;padding:.75rem 1rem;margin-bottom:1rem;font-size:.82rem;color:var(--text)}
.info-box code{font-family:'JetBrains Mono',monospace;font-size:.76rem;background:var(--surface-strong);padding:.1rem .35rem;border-radius:3px}

.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
@media(max-width:800px){.two-col{grid-template-columns:1fr}}

.triad-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:.6rem}
.triad-card{background:var(--surface-soft);border:1px solid var(--border);border-radius:var(--radius);padding:.65rem .75rem;transition:all .15s;cursor:default}
.triad-card:hover{border-color:var(--highlight-border);background:var(--highlight)}
.triad-degree{font-family:'Literata',serif;font-weight:700;font-size:1rem;color:var(--accent);margin-bottom:.15rem}
.triad-quality{font-size:.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.35rem}
.triad-notes{font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:600;color:var(--text);margin-bottom:.2rem}
.triad-pattern{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--text-muted)}

/* ─── Harp strip ──────────────────────────────────────────────────────────── */
.harp-strip{margin-bottom:1.25rem;overflow-x:auto}
.harp-strip-grid{display:grid;grid-template-columns:auto repeat(10,1fr) auto;gap:0;align-items:center;min-width:500px}
.hs-label{font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;color:var(--text-muted);padding:0 .5rem;text-align:right;white-space:nowrap}
.hs-label-r{text-align:left;padding:0 .5rem}
.hs-blow{background:var(--strip-blow-1);color:var(--strip-blow-1-text);font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:700;text-align:center;padding:.4rem .2rem;border:1px solid color-mix(in srgb,var(--strip-blow-1-text) 15%,transparent);transition:all .15s}
.hs-blow.hs-oct2{background:var(--strip-blow-2);color:var(--strip-blow-2-text)}
.hs-blow.hs-oct3{background:var(--strip-blow-3);color:var(--strip-blow-3-text)}
.hs-hole{background:var(--strip-hole-bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.82rem;font-weight:700;text-align:center;padding:.35rem .2rem;border:1px solid var(--strip-hole-border)}
.hs-draw{background:var(--strip-draw-1);color:var(--strip-draw-1-text);font-family:'JetBrains Mono',monospace;font-size:.78rem;font-weight:700;text-align:center;padding:.4rem .2rem;border:1px solid color-mix(in srgb,var(--strip-draw-1-text) 15%,transparent);transition:all .15s}
.hs-draw.hs-oct2{background:var(--strip-draw-2);color:var(--strip-draw-2-text)}
.hs-draw.hs-oct3{background:var(--strip-draw-3);color:var(--strip-draw-3-text)}
/* corners */
.hs-blow:first-of-type{border-radius:var(--radius) 0 0 0}
.hs-draw:first-of-type{border-radius:0 0 0 var(--radius)}
.harp-strip-grid > .hs-blow:nth-child(11){border-radius:0 var(--radius) 0 0}
.harp-strip-grid > .hs-draw:nth-child(23){border-radius:0 0 var(--radius) 0}
/* key label */
.hs-key{font-family:'Literata',serif;font-size:1.1rem;font-weight:700;color:var(--text);text-align:center;padding:.3rem .3rem;grid-row:2}

/* ─── Scale tokens ────────────────────────────────────────────────────────── */
.scale-pos-label{font-family:'Literata',serif;font-size:1.05rem;font-weight:700;color:var(--accent);margin-bottom:.75rem;padding-bottom:.4rem;border-bottom:1.5px solid var(--border)}
.scales-2col{display:grid;grid-template-columns:1fr 1fr;gap:.6rem}
@media(max-width:750px){.scales-2col{grid-template-columns:1fr}}

.scale-row{display:flex;flex-wrap:wrap;align-items:center;gap:.4rem;padding:.5rem .6rem;background:var(--surface-soft);border:1px solid var(--border);border-radius:var(--radius);transition:all .15s}
.scale-row:hover{border-color:var(--highlight-border);background:var(--highlight)}
.scale-name{font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;color:var(--text);width:100%;margin-bottom:.15rem}
.scale-holes{font-family:'JetBrains Mono',monospace;font-size:.82rem;display:flex;flex-wrap:wrap;gap:.25rem;align-items:center}

.sh{padding:.2rem .15rem;border-radius:4px;font-weight:600;white-space:nowrap;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;width:2.6rem;line-height:1.15;gap:0px}
.sh-deg{font-size:.55rem;font-weight:700;opacity:.6;letter-spacing:.02em}
.sh-note{font-size:.74rem;font-weight:700}
.sh-hole{font-size:.62rem;opacity:.7}
.sh-blow{background:color-mix(in srgb,var(--blow-color) 12%,transparent);color:var(--blow-color)}
.sh-draw{background:color-mix(in srgb,var(--draw-color) 12%,transparent);color:var(--draw-color)}
.sh-bend{background:color-mix(in srgb,var(--bend-color) 12%,transparent);color:var(--bend-color)}
.sh-special{background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent);font-style:italic}

/* multi-line scales */
.scale-row-multi .scale-holes+.scale-holes{margin-top:.2rem;padding-top:.2rem;border-top:1px dashed var(--border)}

@media(max-width:700px){
  .app-shell{padding:1rem}
  header h1{font-size:1.3rem}
  .triad-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
  table{font-size:.72rem}
  .sh{width:2.2rem;padding:.12rem .1rem}
  .sh-note{font-size:.68rem}
  .sh-hole{font-size:.58rem}
}
</style>
</head>
<body>
<div class="app-shell" id="app"></div>

<script>

// NOTE / DEGREE RESOLVER
// ═════════════════════════════════════════════════════════════════════════

const SEMI = {'C':0,'C#':1,'Db':1,'D':2,'D#':3,'Eb':3,'E':4,'F':5,'F#':6,'Gb':6,'G':7,'G#':8,'Ab':8,'A':9,'A#':10,'Bb':10,'B':11};
const CHROM = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const DEG_NAMES = ['1','b2','2','b3','3','4','b5','5','b6','6','b7','7'];

function halfUp(note){
  const flat={'Db':'C#','Eb':'D#','Gb':'F#','Ab':'G#','Bb':'A#'};
  const n=flat[note]||note;
  const i=CHROM.indexOf(n);
  return i===-1?'?':CHROM[(i+1)%12];
}

function getDeg(tonic, note){
  const t=SEMI[tonic], n=SEMI[note];
  if(t===undefined||n===undefined) return '?';
  return DEG_NAMES[((n-t)%12+12)%12];
}

function classify(tok) {
  if(tok.includes('*')) return 'special';
  if(/[\u2019']+/.test(tok)) return 'bend';
  if(tok.startsWith('-')) return 'draw';
  return 'blow';
}

function resolveNote(h, tok) {
  if(tok.includes('*')){
    const num=parseInt(tok);
    const hole=h.notes.find(n=>n.h===num);
    return hole?halfUp(hole.draw):'?';
  }
  const isDraw=tok.startsWith('-');
  const stripped=isDraw?tok.slice(1):tok;
  const primeMatch=stripped.match(/[\u2019']+$/);
  const primeCount=primeMatch?primeMatch[0].length:0;
  const num=parseInt(stripped);
  const hole=h.notes.find(n=>n.h===num);
  if(!hole) return '?';
  if(primeCount===0) return isDraw?hole.draw:hole.blow;
  if(isDraw){
    const idx=primeCount-1;
    return hole.bends[idx]?hole.bends[idx].note:'?';
  } else {
    let count=0;
    for(const b of hole.bends){
      if(!b.n.startsWith('-')){count++;if(count===primeCount) return b.note;}
    }
    return '?';
  }
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderTokens(arr, h, posTonic){
  return arr.map(t=>{
    const c=classify(t);
    const cls=c==='blow'?'sh-blow':c==='draw'?'sh-draw':c==='bend'?'sh-bend':'sh-special';
    const note=h?resolveNote(h,t):'';
    const deg=(posTonic&&note&&note!=='?')?getDeg(posTonic,note):'';
    return `<span class="sh ${cls}"><span class="sh-deg">${esc(deg)}</span><span class="sh-note">${esc(note)}</span><span class="sh-hole">${esc(t)}</span></span>`;
  }).join('');
}

// HARP STRIP RENDERER
// ═════════════════════════════════════════════════════════════════════════

function renderHarpStrip(h){
  // Three rows: blow | hole | draw — with octave coloring
  // Oct1: holes 1-3, Oct2: 4-6, Oct3: 7-10
  function octClass(hole){
    if(hole<=3) return '';
    if(hole<=6) return ' hs-oct2';
    return ' hs-oct3';
  }

  let blowCells='', holeCells='', drawCells='';
  for(const n of h.notes){
    const oc=octClass(n.h);
    blowCells+=`<div class="hs-blow${oc}">${n.blow}</div>`;
    holeCells+=`<div class="hs-hole">${n.h}</div>`;
    drawCells+=`<div class="hs-draw${oc}">${n.draw}</div>`;
  }

  return `<div class="harp-strip"><div class="harp-strip-grid">
    <div class="hs-label"></div>${blowCells}<div class="hs-label-r" style="font-size:.7rem">Blow</div>
    <div class="hs-key">${h.tonic}</div>${holeCells}<div class="hs-label-r" style="font-size:.7rem">Hole</div>
    <div class="hs-label"></div>${drawCells}<div class="hs-label-r" style="font-size:.7rem">Draw</div>
  </div></div>`;
}

function allKeys(){
  const k=new Set();
  HARP_KEYS.forEach(hk=>Object.values(HARPS[hk].pos).forEach(v=>k.add(v)));
  const o=['C','C#','Db','D','D#','Eb','E','F','F#','Gb','G','G#','Ab','A','A#','Bb','B'];
  return[...k].sort((a,b)=>o.indexOf(a)-o.indexOf(b));
}

function findPos(hk,tk){
  for(const[p,k]of Object.entries(HARPS[hk].pos)){if(k===tk)return p;}
  return null;
}

// ─── Scales ──────────────────────────────────────────────────────────

function scales(h){
  const pk={'1st':h.pos['1st'],'2nd':h.pos['2nd'],'3rd':h.pos['3rd']};

  function renderScaleCard(sc, posTonic){
    if(sc.holes.length===1){
      return `<div class="scale-row">
        <div class="scale-name">${sc.name}</div>
        <div class="scale-holes">${renderTokens(sc.holes[0],h,posTonic)}</div>
      </div>`;
    } else {
      return `<div class="scale-row scale-row-multi">
        <div class="scale-name">${sc.name}</div>
        <div class="scale-holes">${renderTokens(sc.holes[0],h,posTonic)}</div>
        <div class="scale-holes">${renderTokens(sc.holes[1],h,posTonic)}</div>
      </div>`;
    }
  }

  // Position-specific layouts
  function render1st(posTonic){
    const sc = SCALES['1st'];
    return `<div class="scales-2col">
      ${renderScaleCard(sc[0],posTonic)}
      ${renderScaleCard(sc[1],posTonic)}
    </div>`;
  }

  function render2nd(posTonic){
    const sc = SCALES['2nd'];
    // Mixolydian: two octaves side by side
    const mix = sc[4];
    return `<div class="scales-2col">
      ${renderScaleCard(sc[0],posTonic)}
      ${renderScaleCard(sc[1],posTonic)}
      ${renderScaleCard(sc[2],posTonic)}
      ${renderScaleCard(sc[3],posTonic)}
    </div>
    <div class="scales-2col" style="margin-top:.6rem">
      <div class="scale-row">
        <div class="scale-name">${mix.name}</div>
        <div class="scale-holes">${renderTokens(mix.holes[0],h,posTonic)}</div>
      </div>
      <div class="scale-row">
        <div class="scale-name">${mix.name} <span style="font-size:.7rem;color:var(--text-muted);font-weight:400">(upper)</span></div>
        <div class="scale-holes">${renderTokens(mix.holes[1],h,posTonic)}</div>
      </div>
    </div>`;
  }

  function render3rd(posTonic){
    const sc = SCALES['3rd'];
    // Order: Major pent | Full major, Minor pent | Natural minor, Blues | Dorian
    return `<div class="scales-2col">
      ${renderScaleCard(sc[0],posTonic)}
      ${renderScaleCard(sc[1],posTonic)}
      ${renderScaleCard(sc[2],posTonic)}
      ${renderScaleCard(sc[4],posTonic)}
      ${renderScaleCard(sc[3],posTonic)}
      ${renderScaleCard(sc[5],posTonic)}
    </div>`;
  }

  const posRenderers = {'1st':render1st, '2nd':render2nd, '3rd':render3rd};

  return `
  <div class="card"><h2>Scales \u2014 ${h.label} Harp</h2>
    <p>Scale patterns by position. Universal across all Richter harps \u2014 the notes change but the shapes stay the same.</p>
    <div class="legend" style="margin-top:.5rem">
      <div class="legend-item"><div class="legend-swatch" style="background:var(--blow-color)"></div> Blow</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--draw-color)"></div> Draw</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--bend-color)"></div> Bend</div>
      <div class="legend-item"><div class="legend-swatch" style="background:var(--accent)"></div> Special</div>
    </div></div>

  ${['1st','2nd','3rd'].map(pos=>`<div class="card">
      <div class="scale-pos-label">${pos} Position \u2014 Key of ${pk[pos]}</div>
      ${renderHarpStrip(h)}
      ${posRenderers[pos](pk[pos])}
    </div>`).join('')}

  <div class="card"><h3>Notation Key</h3>
    <div class="info-box">
      <code>4</code> = blow hole 4 &nbsp;
      <code>-4</code> = draw hole 4 &nbsp;
      <code>-3\u2019</code> = draw bend \u00bd step &nbsp;
      <code>-3\u2019\u2019</code> = draw bend whole step &nbsp;
      <code>-3\u2019\u2019\u2019</code> = draw bend 1\u00bd steps &nbsp;
      <code>5*</code> = overblow hole 5
    </div></div>`;
}

// ═════════════════════════════════════════════════════════════════════════
// EVENTS
// ═════════════════════════════════════════════════════════════════════════

function bind(){
  document.querySelectorAll('[data-tp]').forEach(b=>b.addEventListener('click',()=>set({theme:b.dataset.tp})));
  document.querySelectorAll('[data-harp]').forEach(b=>b.addEventListener('click',()=>set({harp:b.dataset.harp,hl:[]})));
  document.querySelectorAll('[data-tab]').forEach(b=>b.addEventListener('click',()=>set({tab:b.dataset.tab,hl:[]})));
  document.querySelectorAll('[data-th]').forEach(c=>{
    c.addEventListener('mouseenter',()=>set({hl:c.dataset.th.split(',').map(Number)}));
    c.addEventListener('mouseleave',()=>set({hl:[]}));
  });
}

render();
</script>
</body>
</html>
